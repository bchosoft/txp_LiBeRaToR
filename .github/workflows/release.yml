name: Build & Release

# Builds TXP LiBeRaToR for Windows, macOS and Linux.
# - On every push / PR: builds all three to verify they compile.
# - On a version tag (e.g. v1.0.0): builds all three and publishes a GitHub Release
#   with the packaged binaries attached.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            wails_platform: windows/amd64
          - os: macos-latest
            platform: macos
            wails_platform: darwin/universal
          - os: ubuntu-latest
            platform: linux
            wails_platform: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            wails build -tags webkit2_41 -platform ${{ matrix.wails_platform }}
          else
            wails build -platform ${{ matrix.wails_platform }}
          fi

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cd build/bin
          if [ "${{ matrix.platform }}" = "windows" ]; then
            7z a "../../dist/TXP_LiBeRaToR-windows-amd64.zip" "TXP_LiBeRaToR.exe"
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            # Wails produces an .app bundle on macOS (named after outputfilename)
            APP_BUNDLE=$(ls -d *.app | head -1)
            ditto -c -k --keepParent "$APP_BUNDLE" "../../dist/TXP_LiBeRaToR-macos-universal.zip"
          else
            chmod +x TXP_LiBeRaToR
            tar -czf "../../dist/TXP_LiBeRaToR-linux-amd64.tar.gz" TXP_LiBeRaToR
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TXP_LiBeRaToR-${{ matrix.platform }}
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/RELEASE_BODY.md
          files: dist/*
